<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" preserveAspectRatio="xMidYMid">
  <defs>
    <linearGradient id="a" x1="0" x2="1">
      <stop offset="0" stop-color="#06b6d4" />
      <stop offset="1" stop-color="#6366f1" />
    </linearGradient>
    <filter id="g" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10" result="b"/>
      <feBlend in="SourceGraphic" in2="b" mode="normal"/>
    </filter>
  </defs>

  <rect width="100%" height="100%" rx="28" fill="#061221" />
  <rect x="12" y="12" width="232" height="232" rx="24" fill="url(#a)" opacity="0.12" />

  <g transform="translate(0,12)">
    <circle cx="128" cy="96" r="60" fill="#071024" opacity="0.95" stroke="url(#a)" stroke-width="4" />
    <text x="128" y="118" font-family="Inter, system-ui, -apple-system, 'Segoe UI', Roboto" font-size="44" font-weight="700" fill="#ffffff" text-anchor="middle">YA</text>
  </g>

  <rect x="28" y="172" width="200" height="48" rx="8" fill="#0b1220" opacity="0.6" />
