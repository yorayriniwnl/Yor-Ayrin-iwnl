<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Demo — Ayush Roy</title>
    <link rel="stylesheet" href="/demo/styles.css" />
  </head>

  <body>
    <div id="player" class="player">
      <div class="slides">
        <div class="slide hero active" style="background-image:url('/screenshots/hero-screenshot.svg')">
          <div class="overlay">
            <h1>Ayush Roy</h1>
            <p>System Builder | React • AI • 3D</p>
          </div>
        </div>

        <div class="slide projects" style="background-image:url('/screenshots/projects-screenshot.svg')">
          <div class="overlay">
            <h2>Selected Projects</h2>
            <p>Yor Zenith - Yor AI vs Real Image - Mentor-Mentee</p>
          </div>
        </div>

        <div class="slide zenith" style="background-image:url('/screenshots/zenith-case-screenshot.svg')">
          <div class="overlay">
            <h2>Yor Zenith — Flagship Case Study</h2>
            <p>Rooftop feasibility, yield modeling, automated reporting</p>
          </div>
        </div>
      </div>

      <div class="controls">
        <button id="startBtn" class="btn">Play Demo (30s)</button>
        <div id="progress" class="progress"><div class="bar"></div></div>
      </div>
    </div>

    <script src="/demo/demo.js"></script>
  </body>
</html>
